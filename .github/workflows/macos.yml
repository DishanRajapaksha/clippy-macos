name: macOS

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Clippy macOS
        run: |
          xcodebuild \
            -project clippy.xcodeproj \
            -scheme "Clippy macOS" \
            -configuration Debug \
            -derivedDataPath "$PWD/.derived" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run parser safety tests
        run: |
          "$PWD/.derived/Build/Products/Debug/Clippy.app/Contents/MacOS/Clippy" --self-test-parser

      - name: Run automation URL tests
        run: |
          "$PWD/.derived/Build/Products/Debug/Clippy.app/Contents/MacOS/Clippy" --self-test-automation

      - name: Validate clippyctl
        run: zsh -n scripts/clippyctl
