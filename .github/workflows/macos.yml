name: macOS

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Clippy macOS
        run: |
          xcodebuild \
            -project clippy.xcodeproj \
            -scheme "Clippy macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
